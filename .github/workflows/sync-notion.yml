name: Sync Notion Variables

on:
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다 (KST 03·09·15·21시)
  workflow_dispatch:          # Actions 탭에서 수동 트리거

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Notion DB → data/notion_variables.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/sync-notion.js

      - name: Commit if changed
        run: |
          git config user.name "notion-sync-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/notion_variables.json
          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "sync: Notion variables $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
