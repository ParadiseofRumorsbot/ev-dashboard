name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 봇 sync 푸시는 deploy를 트리거 못하므로 schedule로 자동 재배포
    # sync-all(매 6h, :00) 직후 + 일일 news 수집(21:30 UTC) 직후
    - cron: '20 */6 * * *'
    - cron: '50 21 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
