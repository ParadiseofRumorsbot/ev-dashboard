name: Sync Notion (Updates + Robotaxi)

on:
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다 (KST 03·09·15·21시)
  workflow_dispatch:          # 수동 트리거

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 1. 기존 모델 변수 동기화 ──
      - name: Sync Notion Variables → data/notion_variables.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/sync-notion.js

      # ── 2. 주간 업데이트 동기화 ──
      - name: Sync Weekly Updates → data/weekly_updates.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_UPDATES_DB_ID: ${{ secrets.NOTION_UPDATES_DB_ID }}
        run: node scripts/sync-updates.js

      # ── 3. 로보택시 타임라인 + FSD 메트릭 ──
      - name: Sync Robotaxi Data → data/robotaxi_data.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TIMELINE_DB_ID: ${{ secrets.NOTION_TIMELINE_DB_ID }}
          NOTION_FSD_METRICS_DB_ID: ${{ secrets.NOTION_FSD_METRICS_DB_ID }}
        run: node scripts/sync-robotaxi.js

      # ── 커밋 & 푸시 ──
      - name: Commit if changed
        run: |
          git config user.name "notion-sync-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "sync: Notion data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
