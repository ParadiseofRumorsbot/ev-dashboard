name: 🚗 Daily EV Launch Timeline Monitor

on:
  schedule:
    # 매일 21:30 UTC = KST 06:30 (루틴 7AM 전 선수집)
    - cron: '30 21 * * *'
  workflow_dispatch:
    # 수동 실행 가능

jobs:
  launch-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch EV launch timeline news
        run: node scripts/news-monitor.js

      - name: Commit and push
        run: |
          git config user.name "launch-monitor-bot"
          git config user.email "launch-bot@users.noreply.github.com"
          git add data/daily_news.json
          if git diff --cached --quiet; then
            echo "✅ 변경 없음 — 커밋 생략"
          else
            git commit -m "🚗 EV launch timeline update $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
