name: 🚗 Daily EV Launch Timeline Monitor

on:
  schedule:
    # 매일 21:30 UTC = KST 06:30 (루틴 7AM 전 선수집)
    - cron: '30 21 * * *'
  workflow_dispatch:
    # 수동 실행 가능

jobs:
  launch-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch EV launch timeline news
        run: node scripts/news-monitor.js

      - name: Upload artifact (커밋은 사용자 확인 후 Claude 루틴에서 처리)
        uses: actions/upload-artifact@v4
        with:
          name: daily-news
          path: data/daily_news.json
          retention-days: 3
