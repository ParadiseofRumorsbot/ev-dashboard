<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미국 2차전지 수입 트래커</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e17;--cd:#111827;--cd2:#1a2332;--bd:#1e293b;--tx:#e2e8f0;--td:#94a3b8;--tm:#64748b;
--ac:#3b82f6;--ag:rgba(59,130,246,.15);--gn:#10b981;--rd:#ef4444;--am:#f59e0b;--cy:#22d3ee;--pk:#f472b6;--or:#fb923c;--pp:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);line-height:1.6}
.ct{max-width:1320px;margin:0 auto;padding:0 20px}
header{padding:28px 0 14px;border-bottom:1px solid var(--bd);margin-bottom:18px}
header h1{font-size:1.45rem;font-weight:900;background:linear-gradient(135deg,var(--ac),var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:.76rem;color:var(--td);margin-top:3px}
.nv{margin-top:8px;display:flex;gap:10px;font-size:.73rem}
.nv a{color:var(--tm);text-decoration:none;padding:3px 8px;border-radius:4px;transition:.2s}
.nv a:hover,.nv a.on{color:var(--ac);background:var(--ag)}
/* THIS WEEK Banner */
.wk{background:linear-gradient(135deg,rgba(59,130,246,.07),rgba(34,211,238,.04));border:1px solid rgba(59,130,246,.12);border-radius:9px;padding:14px 18px;margin-bottom:16px;font-size:.78rem;line-height:1.8}
.wk .tg{font-size:.65rem;font-weight:700;color:var(--cy);letter-spacing:1px}.wk .dt{color:var(--tm);font-size:.68rem}
.wk b{color:var(--tx)}.wk .up{color:var(--gn)}.wk .dn{color:var(--rd)}.wk .warn{color:var(--am)}
/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--bd);overflow-x:auto}
.tabs button{background:none;border:none;color:var(--tm);font-family:inherit;font-size:.82rem;font-weight:600;padding:9px 15px;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap}
.tabs button:hover{color:var(--tx)}.tabs button.on{color:var(--ac);border-bottom-color:var(--ac)}
/* KPI Cards */
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:18px}
.kc{background:var(--cd);border:1px solid var(--bd);border-radius:8px;padding:13px 12px;transition:.2s;cursor:pointer;user-select:none}
.kc:hover{border-color:var(--ac);background:var(--cd2)}
.kc.sel{border-color:var(--ac);box-shadow:0 0 12px rgba(59,130,246,.2);background:var(--cd2)}
.kl{font-size:.66rem;color:var(--tm);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.kv{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:600;margin:4px 0 2px}
.kch{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600}
.kch.u{color:var(--gn)}.kch.d{color:var(--rd)}
.ks{font-size:.66rem;color:var(--tm)}
/* Charts */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.cb{background:var(--cd);border:1px solid var(--bd);border-radius:8px;padding:14px;position:relative}
.cb.f{grid-column:1/-1}
.cb h3{font-size:.8rem;font-weight:600;margin-bottom:10px;color:var(--td);display:flex;align-items:center;justify-content:space-between}
.cb h3 .dl{cursor:pointer;font-size:.7rem;color:var(--tm);padding:2px 6px;border-radius:3px;transition:.2s}
.cb h3 .dl:hover{color:var(--ac);background:var(--ag)}
/* Table */
table.dt{width:100%;border-collapse:collapse;font-size:.72rem}
.dt th{text-align:left;padding:6px 8px;border-bottom:1px solid var(--bd);color:var(--tm);font-weight:500;font-size:.66rem;text-transform:uppercase;letter-spacing:.4px}
.dt td{padding:6px 8px;border-bottom:1px solid rgba(30,41,59,.4);font-family:'JetBrains Mono',monospace;font-size:.7rem}
.dt tr:hover td{background:var(--cd2)}.ar td{background:rgba(239,68,68,.05)}
/* Context Menu */
.ctx{position:fixed;background:var(--cd);border:1px solid var(--bd);border-radius:6px;padding:4px 0;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5);min-width:180px}
.ctx div{padding:7px 14px;font-size:.75rem;cursor:pointer;display:flex;align-items:center;gap:6px}
.ctx div:hover{background:var(--cd2);color:var(--ac)}
footer{border-top:1px solid var(--bd);padding:16px 0;text-align:center;font-size:.68rem;color:var(--tm);margin-top:30px}
.ld{text-align:center;padding:50px;color:var(--tm)}
@media(max-width:768px){.cg{grid-template-columns:1fr}.kpi{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="ct">
<header>
  <h1>🔋 미국 2차전지 수입 트래커</h1>
  <div class="sub">U.S. Census Bureau · 셀 · 소재 · 원료 · 차량 · 주간 자동 업데이트</div>
  <nav class="nv"><a href="index.html">EV 판매</a><a href="robotaxi.html">FSD·로보택시</a><a href="us-import.html" class="on">US 수입</a><a href="Battery_bom_routing.html">ESS BOM</a><a href="battery_scenario.html" style="color:#6b7a99;text-decoration:none;padding:4px 10px;border-radius:6px">Battery Scenario</a><a href="2차전지_컨콜정리.html">컨콜 정리</a></nav>
</header>
<div class="tabs" id="tabs">
  <button class="on" data-tab="cell">⚡ 셀·완제품</button>
  <button data-tab="material">🧪 소재</button>
  <button data-tab="raw">⛏️ 원료</button>
  <button data-tab="vehicle">🚗 차량</button>
  <button data-tab="alert">⚠️ 우회감시</button>
</div>
<div id="app"><div class="ld">데이터 로딩 중...</div></div>
<footer id="ft"></footer>
</div>
<!-- Context Menu -->
<div class="ctx" id="ctxMenu">
  <div onclick="dlExcel('current')">📥 현재 차트 RAW DATA (.xlsx)</div>
  <div onclick="dlExcel('all')">📦 전체 데이터 다운로드 (.xlsx)</div>
  <div onclick="dlImg()">🖼️ 차트 이미지 저장 (.png)</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
// ── Constants ──
const FL={KR:'🇰🇷',CN:'🇨🇳',JP:'🇯🇵',DE:'🇩🇪',CA:'🇨🇦',AU:'🇦🇺',CL:'🇨🇱',AR:'🇦🇷',GB:'🇬🇧',SE:'🇸🇪',MA:'🇲🇦',HU:'🇭🇺',TH:'🇹🇭',ID:'🇮🇩',VN:'🇻🇳',MX:'🇲🇽',PL:'🇵🇱',MY:'🇲🇾',IN:'🇮🇳',OTHER:'🌐'};
const CX={KR:'#3b82f6',CN:'#ef4444',JP:'#f59e0b',DE:'#a78bfa',CA:'#10b981',AU:'#06b6d4',CL:'#8b5cf6',AR:'#d946ef',GB:'#6366f1',SE:'#14b8a6',
MA:'#f472b6',HU:'#22d3ee',TH:'#fb923c',ID:'#818cf8',VN:'#34d399',MX:'#fbbf24',PL:'#c084fc',MY:'#2dd4bf',IN:'#f87171',OTHER:'#475569'};
const HC=['#3b82f6','#ef4444','#f59e0b','#10b981','#a78bfa','#22d3ee','#fb923c','#f472b6','#818cf8','#34d399'];
const fmt=v=>v>=1e9?`$${(v/1e9).toFixed(1)}B`:v>=1e6?`$${(v/1e6).toFixed(0)}M`:`$${(v/1e3).toFixed(0)}K`;
const pct=v=>v>0?`+${v.toFixed(1)}%`:`${v.toFixed(1)}%`;
const ml=t=>{const[y,m]=t.split('-');return`${y.slice(2)}.${m}`};
if(typeof Chart!=='undefined'){Chart.defaults.color='#94a3b8';Chart.defaults.borderColor='rgba(30,41,59,.5)';Chart.defaults.font.family="'Noto Sans KR',sans-serif";Chart.defaults.font.size=11;Chart.defaults.plugins.legend.labels.boxWidth=10;Chart.defaults.plugins.legend.labels.padding=8}

let D,SEL=null,CUR_TAB='cell'; // SEL = {type:'hs'|'country',code:'...'} or null

// ── Context Menu ──
let ctxTarget=null;
document.addEventListener('contextmenu',e=>{
  const card=e.target.closest('.cb,.kc');
  if(!card)return;
  e.preventDefault();
  ctxTarget=card;
  const m=document.getElementById('ctxMenu');
  m.style.display='block';m.style.left=e.pageX+'px';m.style.top=e.pageY+'px';
});
document.addEventListener('click',()=>{document.getElementById('ctxMenu').style.display='none'});

function dlExcel(scope){
  if(typeof XLSX==='undefined'){alert('XLSX 라이브러리 로드 실패');return}
  const wb=XLSX.utils.book_new();
  if(scope==='all'){
    // Full data dump for current tab
    const codes=D.meta.tabs[CUR_TAB]?.codes||[];
    codes.forEach(hs=>{
      const md=D.monthly[hs]||{};
      const months=Object.keys(md).sort();
      const rows=months.map(m=>{
        const d=md[m];if(!d)return{월:m};
        const row={월:m,총수입:d.total};
        Object.entries(d.countries).forEach(([cc,v])=>{row[`${FL[cc]||''} ${D.meta.countries[cc]?.label||cc}`]=v.val});
        return row;
      });
      const ws=XLSX.utils.json_to_sheet(rows);
      const name=(D.meta.hsCodes[hs]?.label||hs).slice(0,31);
      XLSX.utils.book_append_sheet(wb,ws,name);
    });
  } else {
    // Current selection
    const codes=D.meta.tabs[CUR_TAB]?.codes||[];
    const primary=codes[0];
    const hs=SEL?.type==='hs'?SEL.code:primary;
    const md=D.monthly[hs]||{};
    const months=Object.keys(md).sort();
    const rows=months.map(m=>{
      const d=md[m];if(!d)return{월:m};
      const row={월:m,총수입:d.total};
      Object.entries(d.countries).forEach(([cc,v])=>{row[`${FL[cc]||''} ${D.meta.countries[cc]?.label||cc}`]=v.val});
      return row;
    });
    const ws=XLSX.utils.json_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb,ws,'Data');
  }
  const fn=`census_${CUR_TAB}_${D.meta.dataRange.to}.xlsx`;
  XLSX.writeFile(wb,fn);
}

function dlImg(){
  const canvas=document.querySelector('#app canvas');
  if(!canvas){alert('차트 없음');return}
  const a=document.createElement('a');a.href=canvas.toDataURL('image/png');
  a.download=`chart_${CUR_TAB}_${Date.now()}.png`;a.click();
}

// ── Init ──
async function init(){
  if(typeof Chart==='undefined'){document.getElementById('app').innerHTML='<div class="ld" style="color:var(--rd)"><b>Chart.js 로드 실패</b><br>페이지를 새로고침 해보세요.</div>';return}
  try{const r=await fetch('data/census-import.json');if(!r.ok)throw new Error(r.status);D=await r.json()}
  catch(e){document.getElementById('app').innerHTML=`<div class="ld" style="color:var(--rd)"><b>데이터 로드 실패</b><br><span style="color:var(--td)">data/census-import.json 필요</span></div>`;return}
  renderTab('cell');
  document.querySelectorAll('.tabs button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');SEL=null;CUR_TAB=b.dataset.tab;renderTab(b.dataset.tab)}));
  document.getElementById('ft').textContent=`마지막 업데이트: ${D.meta.lastUpdated} · U.S. Census Bureau · 자동 갱신: 매주 월요일`;
}

function destroyCharts(){Object.values(Chart.instances).forEach(c=>c.destroy())}

// ── THIS WEEK Banner ──
function genBanner(tab){
  const codes=D.meta.tabs[tab==='alert'?'cell':tab]?.codes||[];
  const primary=codes[0];if(!primary)return'';
  const md=D.monthly[primary]||{};
  const months=Object.keys(md).sort();if(!months.length)return'';
  const lat=months.at(-1),prev=months.at(-2);
  const yoyM=months.find(m=>{const[y,mo]=lat.split('-');return m===`${+y-1}-${mo}`});
  const ld=md[lat],pd=prev?md[prev]:null,yd=yoyM?md[yoyM]:null;
  const mom=pd?((ld.total-pd.total)/pd.total*100):0;
  const yoy=yd?((ld.total-yd.total)/yd.total*100):0;
  const cns=ld.countries.CN?(ld.countries.CN.val/ld.total*100):0;
  const cnp=yd?.countries.CN?(yd.countries.CN.val/yd.total*100):0;
  const krs=ld.countries.KR?(ld.countries.KR.val/ld.total*100):0;
  const krp=yd?.countries.KR?(yd.countries.KR.val/yd.total*100):0;

  let lines=[`<span class="tg">⚡ THIS WEEK</span> <span class="dt">${D.meta.lastUpdated} (데이터: ${lat})</span><br>`];
  const circ=Object.entries(D.meta.countries).filter(([,v])=>v.group==='circumvention').map(([k])=>k);

  if(tab==='cell'||tab==='alert'){
    lines.push(`🔋 <b>${D.meta.hsCodes[primary].label}</b> ${fmt(ld.total)} (MoM <span class="${mom>=0?'up':'dn'}">${pct(mom)}</span>, YoY <span class="${yoy>=0?'up':'dn'}">${pct(yoy)}</span>)`);
    lines.push(`🇨🇳 <b>중국</b> ${cns.toFixed(1)}% <span class="${cns<cnp?'dn':'up'}">(YoY ${pct(cns-cnp)})</span> · 🇰🇷 <b>한국</b> ${krs.toFixed(1)}% <span class="${krs>krp?'up':'dn'}">(YoY ${pct(krs-krp)})</span>`);
    // Alert detection
    const alerts=circ.filter(cc=>{const v=ld.countries[cc]?.val||0,yv=yd?.countries[cc]?.val||0;return yv&&((v-yv)/yv*100)>50});
    if(alerts.length)lines.push(`⚠️ <span class="warn"><b>우회 급증</b> ${alerts.map(cc=>`${FL[cc]}${D.meta.countries[cc]?.label} YoY ${pct(yd.countries[cc]?.val?((ld.countries[cc].val-yd.countries[cc].val)/yd.countries[cc].val*100):0)}`).join(' · ')}</span>`);
    // 2026-03 중국 비중 급반등 코멘터리
    if(lat==='2026-03'||lat==='2026-04'){
      lines.push(`📌 <b>3월 중국 40.3%(+8.1%p MoM)</b>: 관세 전 Front-loading + 한국 $241M→$95M 급감(-61%) 반사효과`);
      lines.push(`<span style="font-size:10.5px;color:#6b7a99;line-height:1.6">· 중국: 관세 인상 전 선적 집중(Front-loading) — 2025~26년 반복적 패턴<br>· 한국: 설 연휴 생산 공백 + LGES/SDI 북미 현지 생산 전환으로 한국발 수출 구조적 감소<br>· 폴란드: LG 브로츠와프 발 물량 월별 편차 (2월 $90M → 3월 $41M)</span>`);
    }
  }
  if(tab==='material'){
    // Find biggest MoM mover among material codes
    let maxMov={code:'',mom:0,label:''};
    codes.forEach(c=>{const dl=D.monthly[c]?.[lat]?.total,dp=D.monthly[c]?.[prev]?.total;
      if(dl&&dp){const m=((dl-dp)/dp*100);if(Math.abs(m)>Math.abs(maxMov.mom))maxMov={code:c,mom:m,label:D.meta.hsCodes[c]?.label||c}}});
    lines.push(`🧪 <b>소재 최대 변동</b>: ${maxMov.label} MoM <span class="${maxMov.mom>=0?'up':'dn'}">${pct(maxMov.mom)}</span>`);
  }
  if(tab==='raw'){
    const li2co3=D.monthly['283691']?.[lat]?.total;
    const lioh=D.monthly['282520']?.[lat]?.total;
    if(li2co3)lines.push(`⛏️ <b>탄산리튬</b> ${fmt(li2co3)} · <b>수산화리튬</b> ${fmt(lioh||0)}`);
  }
  if(tab==='vehicle'){
    const bev=D.monthly['870380']?.[lat]?.total||0;
    const all=['870380','870340','870350','870360','870321','870322','870323','870324'].reduce((s,c)=>s+(D.monthly[c]?.[lat]?.total||0),0);
    lines.push(`🚗 <b>BEV</b> ${fmt(bev)} · 전체 승용차 대비 <b>${all?(bev/all*100).toFixed(1):'0'}%</b>`);
  }
  return`<div class="wk">${lines.join('<br>')}</div>`;
}

// ── Render generic tab ──
function renderTab(tab){
  destroyCharts();CUR_TAB=tab;
  if(tab==='alert'){renderAlert();return}
  if(tab==='vehicle'){renderVehicle();return}
  const app=document.getElementById('app');
  const codes=D.meta.tabs[tab].codes;
  const primary=codes[0];
  const md=D.monthly[primary]||{};
  const months=Object.keys(md).sort();
  if(!months.length){app.innerHTML='<div class="ld">데이터 없음</div>';return}
  const lat=months.at(-1),prev=months.at(-2);
  const yoyM=months.find(m=>{const[y,mo]=lat.split('-');return m===`${+y-1}-${mo}`});
  const ld=md[lat],pd=prev?md[prev]:null,yd=yoyM?md[yoyM]:null;

  // Build KPI HTML
  let kpi=`${genBanner(tab)}<div class="kpi">`;
  // Primary total
  const mom=pd?((ld.total-pd.total)/pd.total*100):0;
  const yoy=yd?((ld.total-yd.total)/yd.total*100):0;
  kpi+=mkKpiCard(primary,'hs',D.meta.hsCodes[primary].label,fmt(ld.total),mom,`YoY ${pct(yoy)}`);

  // Country cards
  const cns=ld.countries.CN?(ld.countries.CN.val/ld.total*100):0;
  const cnp=yd?.countries.CN?(yd.countries.CN.val/yd.total*100):0;
  kpi+=mkKpiCard('CN','country','🇨🇳 중국',cns.toFixed(1)+'%',cns-cnp,fmt(ld.countries.CN?.val||0),'var(--rd)');
  const krs=ld.countries.KR?(ld.countries.KR.val/ld.total*100):0;
  const krp=yd?.countries.KR?(yd.countries.KR.val/yd.total*100):0;
  kpi+=mkKpiCard('KR','country','🇰🇷 한국',krs.toFixed(1)+'%',krs-krp,fmt(ld.countries.KR?.val||0),'var(--ac)');

  // Sub code cards
  for(let i=1;i<codes.length;i++){
    const c=codes[i],dl=D.monthly[c]?.[lat];if(!dl)continue;
    const dp=D.monthly[c]?.[prev];
    const mm=dp?((dl.total-dp.total)/dp.total*100):0;
    kpi+=mkKpiCard(c,'hs',D.meta.hsCodes[c].label,fmt(dl.total),mm,D.meta.hsCodes[c].labelEn);
  }
  kpi+='</div>';

  app.innerHTML=kpi+`<div class="cg">
    <div class="cb f"><h3><span id="c1title">월별 수입 추이 ($M)</span><span class="dl" onclick="dlExcel('current')">📥</span></h3><canvas id="c1"></canvas></div>
    <div class="cb f"><h3><span id="c2title">국가별 점유율 (Stacked %)</span><span class="dl" onclick="dlExcel('current')">📥</span></h3><div style="font-size:10px;color:#6b7a99;margin:-4px 0 8px;line-height:1.5">📊 수입 금액(USD, CIF) 기준 · HS6 850760 전체(EV+ESS+IT, NCM/LFP 무구분)</div><canvas id="c2"></canvas></div>
    <div class="cb"><h3><span>주요국 추이 ($M)</span><span class="dl" onclick="dlImg()">🖼️</span></h3><canvas id="c3"></canvas></div>
    <div class="cb"><h3><span>최신월 비중</span></h3><canvas id="c4"></canvas></div>
    <div class="cb f" style="padding:0;overflow-x:auto"><table class="dt" id="tbl"></table></div></div>`;

  bindKpiClicks();
  updateCharts();
}

function fmtHS(code){
  if(!code||code==='ICE_ALL')return'';
  const c=code.replace(/\D/g,'');
  if(c.length===6)return`HS ${c.slice(0,4)}.${c.slice(4)}`;
  if(c.length===8)return`HS ${c.slice(0,4)}.${c.slice(4,6)}.${c.slice(6)}`;
  if(c.length===10)return`HS ${c.slice(0,4)}.${c.slice(4,6)}.${c.slice(6,8)}.${c.slice(8)}`;
  return`HS ${c}`;
}

function mkKpiCard(code,type,label,value,change,sub,color){
  const cls=SEL&&SEL.code===code?'kc sel':'kc';
  const vc=color?`style="color:${color}"`:'';
  const hsTag=type==='hs'&&code!=='ICE_ALL'?`<span style="color:var(--tm);font-size:.62rem;opacity:.7">${fmtHS(code)}</span>`:'';
  const subText=sub?`${sub}`:'';
  const divider=subText&&hsTag?' · ':'';
  return`<div class="${cls}" data-code="${code}" data-type="${type}">
    <div class="kl">${label}</div><div class="kv" ${vc}>${value}</div>
    <div class="kch ${change>=0?'u':'d'}">${typeof change==='number'?pct(change):change}</div>

function bindKpiClicks(){
  document.querySelectorAll('.kc').forEach(el=>el.addEventListener('click',()=>{
    const code=el.dataset.code,type=el.dataset.type;
    if(SEL&&SEL.code===code){SEL=null}else{SEL={type,code}}
    document.querySelectorAll('.kc').forEach(x=>x.classList.remove('sel'));
    if(SEL)el.classList.add('sel');
    destroyCharts();updateCharts();
  }));
}

function updateCharts(){
  const codes=D.meta.tabs[CUR_TAB].codes;
  const primary=codes[0];
  const months=Object.keys(D.monthly[primary]||{}).sort();

  // Determine what to show based on SEL
  let chartHS=primary, chartTitle=D.meta.hsCodes[primary].label+' 월별 수입 추이 ($M)';
  let countryFilter=null;

  if(SEL){
    if(SEL.type==='hs'){
      chartHS=SEL.code;
      chartTitle=D.meta.hsCodes[SEL.code]?.label+' 월별 수입 추이 ($M)';
    }else if(SEL.type==='country'){
      countryFilter=SEL.code;
      chartTitle=`${FL[SEL.code]} ${D.meta.countries[SEL.code]?.label} — ${D.meta.hsCodes[primary].label} 수입 추이 ($M)`;
    }
  }

  const md=D.monthly[chartHS]||{};
  const lat=months.at(-1);
  const ld=md[lat];if(!ld)return;
  document.getElementById('c1title').textContent=chartTitle;

  // C1: Bar chart
  if(countryFilter){
    mkBar('c1',months,m=>(md[m]?.countries[countryFilter]?.val||0)/1e6,CX[countryFilter]);
  }else{
    mkBar('c1',months,m=>(md[m]?.total||0)/1e6);
  }

  // C2: Stacked share (always based on chartHS)
  document.getElementById('c2title').textContent=countryFilter
    ?`${FL[countryFilter]} ${D.meta.countries[countryFilter]?.label} 점유율 추이 (%)`
    :(D.meta.hsCodes[chartHS]?.label||'')+' 국가별 점유율 (Stacked %)';

  if(countryFilter){
    // Single country share line
    new Chart(document.getElementById('c2'),{type:'line',data:{labels:months.map(ml),
      datasets:[{label:`${FL[countryFilter]} 점유율`,
        data:months.map(m=>{const d=md[m];return d?.total?((d.countries[countryFilter]?.val||0)/d.total*100):0}),
        borderColor:CX[countryFilter],backgroundColor:CX[countryFilter]+'20',fill:true,tension:.3,pointRadius:0,borderWidth:2}]},
      options:{responsive:true,plugins:{legend:{display:false}},
      scales:{y:{ticks:{callback:v=>`${v}%`},grid:{color:'rgba(30,41,59,.3)'}},x:{ticks:{maxRotation:45,font:{size:9}},grid:{display:false}}}}});
  }else{
    mkStacked('c2',months,ld,md,chartHS);
  }

  // C3: Lines
  mkLines('c3',months,md,ld);
  // C4: Pie
  mkPie('c4',ld);
  // Table
  const prev=months.at(-2);
  const yoyM=months.find(m=>{const[y,mo]=lat.split('-');return m===`${+y-1}-${mo}`});
  mkTable('tbl',ld,prev?md[prev]:null,yoyM?md[yoyM]:null);
}

// ── Chart Helpers ──
function chartOpt(unit){return{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:9}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${unit==='%'?c.raw.toFixed(1)+'%':'$'+c.raw.toFixed(0)+'M'}`}}},
  scales:{y:{ticks:{callback:v=>unit==='%'?`${v}%`:`$${v}M`},grid:{color:'rgba(30,41,59,.3)'}},x:{ticks:{maxRotation:45,font:{size:9}},grid:{display:false}}}}}

function mkBar(id,months,fn,color){
  new Chart(document.getElementById(id),{type:'bar',data:{labels:months.map(ml),
    datasets:[{data:months.map(fn),backgroundColor:color?color+'99':months.map(m=>{
      const y=m.split('-')[0];return y==='2023'?'rgba(59,130,246,.3)':y==='2024'?'rgba(59,130,246,.5)':y==='2025'?'rgba(59,130,246,.75)':'rgba(59,130,246,.9)'}),borderRadius:2}]},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`$${c.raw.toFixed(0)}M`}}},
    scales:{y:{ticks:{callback:v=>`$${v}M`},grid:{color:'rgba(30,41,59,.3)'}},x:{ticks:{maxRotation:45,font:{size:9}},grid:{display:false}}}}});
}

function mkStacked(id,months,ld,md){
  const ccs=Object.entries(ld.countries).filter(([,v])=>v.val>0).sort((a,b)=>b[1].val-a[1].val).map(([k])=>k).slice(0,10);
  new Chart(document.getElementById(id),{type:'bar',data:{labels:months.map(ml),
    datasets:ccs.map(cc=>({label:`${FL[cc]||''} ${D.meta.countries[cc]?.label||cc}`,
      data:months.map(m=>{const d=md[m];return d?.total?((d.countries[cc]?.val||0)/d.total*100):0}),
      backgroundColor:CX[cc]||'#475569'}))},
    options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:9}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.raw.toFixed(1)}%`}}},
    scales:{x:{stacked:true,ticks:{maxRotation:45,font:{size:9}},grid:{display:false}},y:{stacked:true,max:100,ticks:{callback:v=>`${v}%`},grid:{color:'rgba(30,41,59,.3)'}}}}});
}

function mkLines(id,months,md,ld){
  const top=Object.entries(ld.countries).filter(([k])=>k!=='OTHER').sort((a,b)=>b[1].val-a[1].val).slice(0,6).map(([k])=>k);
  new Chart(document.getElementById(id),{type:'line',data:{labels:months.map(ml),
    datasets:top.map(cc=>({label:`${FL[cc]} ${D.meta.countries[cc]?.label||cc}`,
      data:months.map(m=>(md[m]?.countries[cc]?.val||0)/1e6),borderColor:CX[cc],
      backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:2}))},options:chartOpt('$M')});
}

function mkPie(id,ld){
  const pie=Object.entries(ld.countries).filter(([,v])=>v.val>0).sort((a,b)=>b[1].val-a[1].val).slice(0,8);
  new Chart(document.getElementById(id),{type:'doughnut',data:{
    labels:pie.map(([k])=>`${FL[k]||''} ${D.meta.countries[k]?.label||k}`),
    datasets:[{data:pie.map(([,v])=>v.val/1e6),backgroundColor:pie.map(([k])=>CX[k]||'#475569'),borderColor:'var(--cd)',borderWidth:2}]},
    options:{responsive:true,plugins:{legend:{position:'right',labels:{font:{size:9},padding:5}}}}});
}

function mkTable(id,ld,pd,yd){
  const tbl=document.getElementById(id);if(!tbl)return;
  const all=Object.entries(ld.countries).filter(([k])=>k!=='OTHER').sort((a,b)=>b[1].val-a[1].val);
  let h='<thead><tr><th>국가</th><th style="text-align:right">수입액</th><th style="text-align:right">점유율</th><th style="text-align:right">MoM</th><th style="text-align:right">YoY</th><th>그룹</th></tr></thead><tbody>';
  for(const[cc,info]of all){
    const sh=(info.val/ld.total*100).toFixed(1);
    const pv=pd?.countries[cc]?.val||0,yv=yd?.countries[cc]?.val||0;
    const mm=pv?((info.val-pv)/pv*100):0,yy=yv?((info.val-yv)/yv*100):0;
    const g=D.meta.countries[cc]?.group||'';const ic=g==='circumvention';
    h+=`<tr${ic&&yy>50?' class="ar"':''}>
      <td>${FL[cc]||''} ${D.meta.countries[cc]?.label||cc}</td><td style="text-align:right">${fmt(info.val)}</td>
      <td style="text-align:right">${sh}%</td>
      <td style="text-align:right;color:${mm>=0?'var(--gn)':'var(--rd)'}">${pct(mm)}</td>
      <td style="text-align:right;color:${yy>=0?'var(--gn)':'var(--rd)'}">${pct(yy)}</td>
      <td style="color:${ic?'var(--am)':'var(--tm)'}">${ic?'⚠️ 감시':'주요국'}</td></tr>`}
  tbl.innerHTML=h+'</tbody>';
}

// CSV download for lithium data
function dlLiCSV(){
  let csv='Date,China_Carbonate_USD_T\n';
  LI_WEEKLY_DATA.forEach(d=>{if(d.cc)csv+=`${d.d},${d.cc}\n`});
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`lithium_weekly_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(a.href);
}

init();

// ── Lithium Price Chart ──
const LI_W = LI_WEEKLY_DATA;
function renderLithium(){
  const wrap=document.getElementById('liWrap');if(!wrap)return;
  const data=LI_W.filter(d=>d.cc);
  const labels=data.map(d=>d.d);
  const vals=data.map(d=>d.cc);
  // 12MA
  const ma=vals.map((_,i)=>{const s=Math.max(0,i-51);const sl=vals.slice(s,i+1);return sl.reduce((a,b)=>a+b,0)/sl.length});
  new Chart(document.getElementById('liC'),{type:'line',data:{labels:labels.map(l=>{const p=l.split('-');return p[1]==='01'?p[0]:'';}),
    datasets:[
      {label:'중국 탄산리튬 ($/톤)',data:vals,borderColor:'#f43f5e',backgroundColor:'rgba(244,63,94,0.08)',fill:true,tension:.2,pointRadius:0,borderWidth:1.5},
      {label:'12개월 이동평균',data:ma,borderColor:'#3b82f6',backgroundColor:'transparent',tension:.2,pointRadius:0,borderWidth:1.2,borderDash:[4,3]},
    ]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:9}}},
      tooltip:{callbacks:{label:c=>`${c.dataset.label}: $${c.raw.toLocaleString(undefined,{maximumFractionDigits:0})}/톤`}}},
    scales:{y:{ticks:{callback:v=>`$${(v/1000).toFixed(0)}K`},grid:{color:'rgba(30,41,59,.3)'}},
      x:{ticks:{maxRotation:0,font:{size:9},autoSkip:true,maxTicksLimit:12},grid:{display:false}}}}});
  const last=data[data.length-1];
  document.getElementById('liInfo').textContent=`최신: ${last.d} · $${last.cc.toLocaleString()}/톤 · 12MA $${Math.round(ma[ma.length-1]).toLocaleString()}/톤`;
}

// Inject lithium section HTML after main content
const ftEl=document.getElementById('ft');
if(ftEl){
  const liDiv=document.createElement('div');
  liDiv.style.cssText='background:var(--cd);border:1px solid var(--bd);border-radius:12px;padding:16px 20px;margin-top:20px';
  liDiv.innerHTML=`<h3 style="font-size:13px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
    <span>⛏️ 리튬 현물가 ($/톤) — Bloomberg</span><button onclick="dlLiCSV()" style="font-size:10px;padding:4px 10px;border:1px solid var(--bd);border-radius:6px;background:var(--cd2);color:var(--tx);cursor:pointer;font-family:inherit">📥 CSV</button></h3>
    <div id="liWrap"><canvas id="liC"></canvas></div>
    <div id="liInfo" style="font-size:.68rem;color:var(--tm);margin-top:6px"></div>
    <div id="liQ" style="margin-top:10px"></div>`;
  ftEl.parentNode.insertBefore(liDiv,ftEl);
  renderLithium();
  // Quarterly averages
  const qMap={};LI_W.filter(d=>d.cc).forEach(d=>{
    const yr=d.d.substring(0,4),m=parseInt(d.d.substring(5,7)),q=`${yr}Q${Math.ceil(m/3)}`;
    if(!qMap[q])qMap[q]={s:0,n:0};qMap[q].s+=d.cc;qMap[q].n++});
  const qs=Object.keys(qMap).sort().slice(-12);
  const qAvgs=qs.map(q=>({q,avg:Math.round(qMap[q].s/qMap[q].n)}));
  let qh=`<div style="font-size:.68rem;color:var(--tm);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;font-weight:600">분기별 평균 ($/톤)</div>`;
  qh+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px;font-size:.68rem">`;
  qAvgs.forEach((q,i)=>{const prev=i>0?qAvgs[i-1].avg:null;const chg=prev?((q.avg-prev)/prev*100):0;
    qh+=`<div style="background:var(--cd2);padding:6px;border-radius:4px;text-align:center">
      <div style="color:var(--tm);font-size:.6rem">${q.q}</div>
      <div style="font-weight:700;color:var(--tx);font-size:.8rem">$${q.avg.toLocaleString()}</div>
      ${prev?`<div style="font-size:.55rem;color:${chg>0?'var(--gn)':chg<0?'var(--rd)':'var(--tm)'}">${chg>0?'+':''}${chg.toFixed(1)}%</div>`:''}</div>`});
  qh+=`</div>`;document.getElementById('liQ').innerHTML=qh;
}
